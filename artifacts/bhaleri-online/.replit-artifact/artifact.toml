kind = "web"
previewPath = "/"
title = "Bhaleri Online"
version = "1.0.0"
id = "artifacts/bhaleri-online"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20781

[services.development]
run = "pnpm --filter @workspace/bhaleri-online run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bhaleri-online", "run", "build" ]
publicDir = "artifacts/bhaleri-online/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20781"
BASE_PATH = "/"
